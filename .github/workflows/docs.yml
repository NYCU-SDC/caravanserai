name: Deploy Schema Docs

on:
  push:
    branches: [main]
    paths:
      - 'schemas/**'
      - 'api/v1/**'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'schemas/**'
      - 'api/v1/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install json-schema-for-humans
        run: pip install json-schema-for-humans

      - name: Generate schema docs
        run: |
          mkdir -p website/out
          generate-schema-doc \
            --config expand_buttons=true \
            --config template_name=js \
            schemas/ website/out/

      - name: Generate index page
        run: |
          cat > website/out/index.html << 'HEREDOC'
          <!DOCTYPE html>
          <html lang="en">
          <head>
            <meta charset="UTF-8">
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>Caravanserai API Schema Documentation</title>
            <style>
              body {
                font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
                max-width: 720px;
                margin: 2rem auto;
                padding: 0 1rem;
                color: #24292e;
                line-height: 1.6;
              }
              h1 { border-bottom: 1px solid #e1e4e8; padding-bottom: 0.5rem; }
              ul { list-style: none; padding: 0; }
              li { margin: 0.75rem 0; }
              a {
                color: #0366d6;
                text-decoration: none;
                font-size: 1.1rem;
                font-weight: 500;
              }
              a:hover { text-decoration: underline; }
              .desc { color: #586069; font-size: 0.9rem; margin-left: 0.25rem; }
              footer { margin-top: 3rem; color: #586069; font-size: 0.85rem; border-top: 1px solid #e1e4e8; padding-top: 1rem; }
            </style>
          </head>
          <body>
            <h1>Caravanserai API Schema Documentation</h1>
            <p>Resource type definitions for the Caravanserai container orchestration platform.</p>
            <ul>
          HEREDOC

          for schema in website/out/*.html; do
            filename=$(basename "$schema")
            [ "$filename" = "index.html" ] && continue
            name="${filename%.html}"
            title="$(echo "$name" | sed 's/.*/\u&/')"
            echo "      <li><a href=\"${filename}\">${title}</a></li>" >> website/out/index.html
          done

          cat >> website/out/index.html << 'HEREDOC'
            </ul>
            <footer>
              Generated from <a href="https://github.com/NYCU-SDC/caravanserai/tree/main/schemas">JSON Schema sources</a>
              by <a href="https://github.com/coveooss/json-schema-for-humans">json-schema-for-humans</a>.
            </footer>
          </body>
          </html>
          HEREDOC

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./website/out
          keep_files: true

      - name: Deploy PR preview
        if: github.event_name == 'pull_request'
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: ./website/out
