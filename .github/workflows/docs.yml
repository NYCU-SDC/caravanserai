name: Deploy Schema Docs

on:
  push:
    branches: [main]
    paths:
      - 'schemas/**'
      - 'api/v1/**'
      - '.github/workflows/docs.yml'
  pull_request:
    paths:
      - 'schemas/**'
      - 'api/v1/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install json-schema-for-humans
        run: pip install json-schema-for-humans

      - name: Generate schema docs
        run: |
          mkdir -p website/out
          generate-schema-doc \
            --config expand_buttons=true \
            --config template_name=js \
            schemas/ website/out/

      - name: Generate index page
        run: scripts/generate-index.sh website/out

      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./website/out
          keep_files: true

      - name: Deploy PR preview
        if: github.event_name == 'pull_request'
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: ./website/out
