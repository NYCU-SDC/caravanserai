# Development-only: provides PostgreSQL for cara-server.
# Server and agent are built and run locally via Makefile targets.
#
# Usage:
#   docker compose up -d        # start PostgreSQL
#   docker compose down         # stop (preserves data)
#   docker compose down -v      # stop and wipe data volume

services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: caravanserai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
